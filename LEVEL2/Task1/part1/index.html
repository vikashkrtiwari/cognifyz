<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card mx-auto shadow" style="width: 22rem;">
            <img src="images/tablet1.jpg" class="card-img-top" alt="Laptop">
            <div class="card-body">
                <h3 class="card-title"> "Modren Tablet"</h3>

                <p class="card-text">
                    tablets are lightweight and portable devices used for online learning, reading, watching videos, gaming, and entertainment.
                </p>

                <a href="#" class="btn btn-primary">
                    Learn More
                </a>

            </div>

        </div>

    </div>

</body>
</html>
